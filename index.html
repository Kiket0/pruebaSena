<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦖 Dino Runner - Juego HTML5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            position: relative;
        }

        canvas {
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8E8 70%, #F4A261 100%);
            cursor: pointer;
        }

        .game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            font-weight: bold;
            z-index: 10;
        }

        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .high-score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 2rem;
            border-radius: 20px;
            display: none;
        }

        .game-over h2 {
            color: #ff4757;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        .final-score {
            font-size: 1.5rem;
            margin: 1rem 0;
            color: #fff;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            margin: 0.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.9;
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            canvas {
                width: 95vw;
                height: 50vh;
                max-width: 400px;
                max-height: 300px;
            }
            
            .mobile-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="game-ui">
            <div class="score" id="score">Puntos: 0</div>
            <div class="high-score" id="highScore">Récord: 0</div>
            
            <div class="game-over" id="gameOver">
                <h2>💥 ¡GAME OVER!</h2>
                <div class="final-score" id="finalScore">Puntos: 0</div>
                <div>🥇 Nuevo Récord!</div>
                <button class="btn" onclick="restartGame()">🔄 Jugar de Nuevo</button>
            </div>
            
            <div class="instructions">
                Presiona ESPACIO o toca para saltar 🦖
            </div>
        </div>

        <div class="mobile-controls">
            <button class="btn" style="padding: 15px; font-size: 1.5rem;" onclick="jump()">⬆️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        // Game state
        let gameRunning = true;
        let score = 0;
        let highScore = localStorage.getItem('dinoHighScore') || 0;
        highScoreEl.textContent = `Récord: ${highScore}`;

        // Dino
        const dino = {
            x: 50,
            y: 300,
            width: 40,
            height: 40,
            dy: 0,
            gravity: 0.6,
            jumpPower: -14,
            grounded: false,
            frame: 0
        };

        // Obstacles
        let obstacles = [];
        let obstacleSpeed = 4;
        let obstacleTimer = 0;

        // Clouds
        let clouds = [];

        // Input
        let keys = {};
        let touchJump = false;

        // Initialize
        function init() {
            obstacles = [];
            clouds = [];
            score = 0;
            dino.y = 300;
            dino.dy = 0;
            dino.grounded = true;
            gameRunning = true;
            obstacleSpeed = 4;
            gameOverEl.style.display = 'none';
            gameLoop();
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && dino.grounded) {
                dino.dy = dino.jumpPower;
                dino.grounded = false;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        function jump() {
            if (dino.grounded && gameRunning) {
                dino.dy = dino.jumpPower;
                dino.grounded = false;
            }
        }

        // Generate clouds
        function createCloud() {
            clouds.push({
                x: canvas.width,
                y: Math.random() * 100 + 20,
                size: Math.random() * 30 + 20,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Dino physics
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            if (dino.y >= 300) {
                dino.y = 300;
                dino.dy = 0;
                dino.grounded = true;
            }

            // Animation frame
            dino.frame += 0.2;
            if (dino.frame > 2) dino.frame = 0;

            // Obstacles
            obstacleTimer++;
            if (obstacleTimer > 90 - Math.min(score / 100, 50)) {
                obstacles.push({
                    x: canvas.width,
                    y: 320,
                    width: 25,
                    height: 40,
                    type: Math.random() > 0.5 ? 'cactus' : 'bird'
                });
                obstacleTimer = 0;
            }

            // Update obstacles
            obstacles = obstacles.filter(obstacle => {
                obstacle.x -= obstacleSpeed;
                obstacleSpeed += 0.001;
                return obstacle.x > -50;
            });

            // Update clouds
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
            });
            clouds = clouds.filter(cloud => cloud.x > -100);

            if (Math.random() < 0.01) createCloud();

            // Collision detection
            obstacles.forEach(obstacle => {
                if (dino.x < obstacle.x + obstacle.width &&
                    dino.x + dino.width > obstacle.x &&
                    dino.y < obstacle.y + obstacle.height &&
                    dino.y + dino.height > obstacle.y) {
                    gameOver();
                }
            });

            // Update score
            score++;
            scoreEl.textContent = `Puntos: ${Math.floor(score / 10)}`;
        }

        // Render
        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#F4A261';
            ctx.fillRect(0, 340, canvas.width, 60);

            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.3, cloud.y, cloud.size * 0.7, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.6, cloud.y, cloud.size * 0.8, 0, Math.PI * 2);
                ctx.fill();
            });

            // Dino
            ctx.fillStyle = '#4a7c59';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            
            // Body
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
            
            // Head
            ctx.fillRect(dino.x + dino.width - 15, dino.y - 10, 20, 20);
            
            // Eye
            ctx.fillStyle = 'white';
            ctx.fillRect(dino.x + dino.width - 8, dino.y - 5, 6, 6);
            ctx.fillStyle = 'black';
            ctx.fillRect(dino.x + dino.width - 6, dino.y - 3, 3, 3);
            
            // Legs animation
            ctx.fillStyle = '#3a5c49';
            const legOffset = dino.grounded ? Math.sin(dino.frame) * 3 : 0;
            ctx.fillRect(dino.x + 5, dino.y + dino.height - 5, 8, 15 + legOffset);
            ctx.fillRect(dino.x + 25, dino.y + dino.height - 5, 8, 15 - legOffset);
            
            ctx.shadowBlur = 0;

            // Obstacles
            obstacles.forEach(obstacle => {
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                
                if (obstacle.type === 'cactus') {
                    ctx.fillStyle = '#2d5a27';
                    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                    ctx.fillRect(obstacle.x + 5, obstacle.y - 10, 15, 15);
                } else {
                    // Bird
                    ctx.fillStyle = '#ff6b6b';
                    ctx.beginPath();
                    ctx.arc(obstacle.x + 12, obstacle.y + 10, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff8e8e';
                    ctx.fillRect(obstacle.x + 5, obstacle.y + 18, 20, 8);
                }
                
                ctx.shadowBlur = 0;
            });
        }

        // Game loop
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            if (Math.floor(score / 10) > highScore) {
                highScore = Math.floor(score / 10);
                localStorage.setItem('dinoHighScore', highScore);
                highScoreEl.textContent = `Récord: ${highScore}`;
                finalScoreEl.innerHTML = `Puntos: ${Math.floor(score / 10)}<br>🥇 ¡Nuevo Récord!`;
            } else {
                finalScoreEl.textContent = `Puntos: ${Math.floor(score / 10)}`;
            }
            gameOverEl.style.display = 'block';
        }

        // Restart
        function restartGame() {
            init();
        }

        // Start game
        init();
    </script>
</body>
</html>
